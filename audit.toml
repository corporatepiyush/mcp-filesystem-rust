# Configuration for `cargo audit` (https://github.com/rustsec/rustsec).
#
# Run with:  cargo audit
# In CI:     cargo audit --deny warnings  (after acknowledging the items below)

[advisories]
# RUSTSEC-2023-0071 — Marvin timing side-channel in the `rsa` crate.
#
# No fixed release of `rsa` exists yet. This server performs only *local* file
# encryption/decryption, so there is no remote timing oracle and the practical
# risk is low. We acknowledge it here and prefer steering users toward
# AES-GCM / ChaCha20-Poly1305 / ML-KEM. Revisit when `rsa` ships a fix or when
# we migrate RSA modes to a constant-time backend.
ignore = ["RUSTSEC-2023-0071"]
